backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "circuits"
    label: "Circuits"
    folder: "content/circuits"
    create: false
    extension: "json"
    format: "json"
    slug: "circuit-{{fields.circuit_number}}"
    identifier_field: "circuit_name"
    fields:
      - { label: "Circuit Number", name: "circuit_number", widget: "number", value_type: "int" }
      - { label: "Circuit Name", name: "circuit_name", widget: "string" }
      - label: "Counties"
        name: "counties"
        widget: "list"
        field: { label: "County", name: "county", widget: "string" }
      - { label: "Coordinator/Director", name: "coordinator", widget: "string", required: false }
      - { label: "Department Name", name: "department", widget: "string", required: false }
      - { label: "Phone", name: "phone", widget: "string", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Fax", name: "fax", widget: "string", required: false }
      - { label: "Physical Address", name: "address", widget: "text", required: false }
      - { label: "Mailing Address", name: "mailing_address", widget: "text", required: false }
      - { label: "Website URL", name: "website", widget: "string", required: false }
      - label: "Programs Offered"
        name: "programs"
        widget: "list"
        field: { label: "Program", name: "program", widget: "string" }
      - label: "County-Specific Contacts"
        name: "county_contacts"
        widget: "list"
        required: false
        fields:
          - { label: "County/Location", name: "county", widget: "string" }
          - { label: "Contact Name", name: "contact_name", widget: "string", required: false }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Address", name: "address", widget: "string", required: false }
      - label: "Additional Staff"
        name: "additional_staff"
        widget: "list"
        required: false
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Notes", name: "notes", widget: "markdown", required: false }
      - { label: "Hours", name: "hours", widget: "string", required: false }
      - { label: "Last Verified", name: "last_verified", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Overview"
        name: "overview"
        file: "content/pages/overview.json"
        fields:
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - { label: "Program Types", name: "program_types", widget: "markdown" }
          - { label: "Statewide Trends", name: "trends", widget: "markdown" }
          - label: "External Links"
            name: "external_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - { label: "Last Updated", name: "last_updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }

      - label: "Site Settings"
        name: "settings"
        file: "content/pages/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Footer Disclaimer", name: "disclaimer", widget: "markdown" }
          - { label: "Last Updated", name: "last_updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
